name: CI

on:
  push:
    branches: [main, development]
  pull_request:

jobs:
  ci:
    name: Check, build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: extractions/setup-just@v3

      - run: just ci
