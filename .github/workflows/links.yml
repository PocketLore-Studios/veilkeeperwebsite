name: Check links

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1' # weekly, Monday 09:00 UTC
  workflow_dispatch:

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build site
        run: |
          npm ci
          npm run build

      - name: Check links in built site
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --root-dir ${{ github.workspace }}/dist
            --index-files index.html
            --accept '200..=299,403,429'
            --remap '^https://veilkeepergame\.com file://${{ github.workspace }}/dist'
            --remap '^https://www\.veilkeepergame\.com file://${{ github.workspace }}/dist'
            --remap 'https://discord.com/invite/(.*) https://discord.com/api/v10/invites/$1'
            'dist/**/*.html'
          fail: true
          
